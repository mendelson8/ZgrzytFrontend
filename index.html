<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zgrzyt Wiki - Filmy</title>

    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 24px; background-color: #121212; color: #e0e0e0;
        }
        h1 { text-align: center; color: white; }
        #movieList {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; max-width: 1400px; margin: 20px auto;
        }
        .movie-card {
            background-color: #2a2a2a; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .video-placeholder {
            width: 100%;
            height: 180px;
            background-color: #000;
            border-bottom: 1px solid #444;
        }
        .video-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .movie-info { padding: 16px; }
        .movie-info h3 { margin-top: 0; margin-bottom: 8px; font-size: 1.15em; color: white; }
        .movie-info p { font-size: 0.9em; color: #b0b0b0; margin: 4px 0; }
        .segments-container {
            padding: 0 16px 16px 16px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #444;
        }
        .segments-container h4 { margin-bottom: 8px; color: #eee; }
        .segments-container ul { list-style: none; padding-left: 0; margin: 0; }
        .segment-item {
            border-bottom: 1px solid #3a3a3a; padding: 8px 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .segment-item:last-child { border-bottom: none; }
        .segment-item:hover { background-color: #3c3c3c; }
        .segment-time { font-weight: bold; color: #80cbc4; pointer-events: none; }
        .segment-desc { font-size: 0.9em; color: #ccc; pointer-events: none; }
        .segment-tags { font-size: 0.8em; color: #80cbc4; font-family: monospace; pointer-events: none; }
        #loading, #error { text-align: center; font-size: 1.2em; padding: 40px; }
        .error { color: #ff8a80; }

        /* --- STYLE DLA SCROLLBARÓW --- */

        /* Ustawienia globalne dla Firefox (główny scrollbar) */
        html {
            scrollbar-width: thin;
            scrollbar-color: #555 #121212; /* Kciuk i Tło strony */
        }

        /* Ustawienia dla wewnętrznego kontenera w Firefox */
        .segments-container {
            scrollbar-color: #555 #2a2a2a; /* Kciuk i Tło karty */
        }

        /* --- Ustawienia dla WebKit (Chrome, Safari, Edge) --- */

        /* Ustawia szerokość dla WSZYSTKICH scrollbarów */
        ::-webkit-scrollbar {
            width: 8px;
        }

        /* Tło dla scrollbara głównej strony */
        html::-webkit-scrollbar-track {
            background: #121212; /* Tło całej strony */
        }

        /* Tło dla scrollbara wewnątrz karty */
        .segments-container::-webkit-scrollbar-track {
            background: #2a2a2a; /* Tło karty */
        }

        /* Wygląd "kciuka" (przesuwaka) */
        ::-webkit-scrollbar-thumb {
            background-color: #555;
            border-radius: 10px;
        }

        /* Dodaje obramowanie w kolorze tła strony (dla głównego scrollbara) */
        html::-webkit-scrollbar-thumb {
            border: 2px solid #121212;
        }

        /* Dodaje obramowanie w kolorze tła karty (dla wewnętrznego scrollbara) */
        .segments-container::-webkit-scrollbar-thumb {
            border: 2px solid #2a2a2a;
        }

        /* Efekt hover dla "kciuka" */
        ::-webkit-scrollbar-thumb:hover {
            background-color: #777;
        }

        ::-webkit-scrollbar-button {
            display: none;
            height: 0;
            width: 0;
        }

        ::-webkit-scrollbar-button:start:decrement,
        ::-webkit-scrollbar-button:end:increment {
            display: none !important;
            height: 0;
            width: 0;
        }
        scrollbarbutton {
            display: none !important;
        }
    </style>
</head>
<body>

<h1>🎞️ Filmy z Playlisty Zgrzytu</h1>
<div id="movieList">
    <p id="loading">Ładowanie filmów...</p>
</div>

<script>
    const movieListContainer = document.getElementById('movieList');
    const loadingIndicator = document.getElementById('loading');
    const apiUrl = 'https://zgrzyt-api-901505990545.europe-west4.run.app/api';

    let activePlayers = {};

    function onYouTubeIframeAPIReady() {
        fetchAndRenderMovies();
    }

    function fetchAndRenderMovies() {
        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error(`Błąd HTTP: ${response.status}`);
                return response.json();
            })
            .then(movies => {
                loadingIndicator.remove();
                if (movies.length === 0) {
                    movieListContainer.innerHTML = '<p>Brak filmów w bazie danych.</p>';
                    return;
                }

                movies.forEach(movie => {
                    const movieCard = document.createElement('div');
                    movieCard.className = 'movie-card';
                    movieCard.dataset.movieId = movie.movieId;

                    let formattedDate = 'Brak daty';
                    if (movie.date) {
                        formattedDate = new Date(movie.date).toLocaleDateString('pl-PL');
                    }
                    const thumbnailUrl = movie.thumbnailUrl || 'https://via.placeholder.com/300x170?text=Brak+Miniaturki';

                    let movieHtml = `
                            <div class="video-placeholder">
                                <div id="player-${movie.movieId}">
                                    <img src="${thumbnailUrl}" alt="Miniaturka filmu" style="width:100%; height:100%; object-fit: cover;">
                                </div>
                            </div>
                            <div class="movie-info">
                                <h3>${movie.title}</h3>
                                <p><strong>Data:</strong> ${formattedDate}</p>
                            </div>
                        `;

                    let segmentsHtml = '<div class="segments-container"><h4>Segmenty:</h4>';
                    if (movie.segments && movie.segments.length > 0) {
                        segmentsHtml += '<ul>';
                        movie.segments.forEach(segment => {
                            const startTime = segment.id.timestamp;
                            const minutes = Math.floor(startTime / 60).toString().padStart(2, '0');
                            const seconds = (startTime % 60).toString().padStart(2, '0');
                            const time = `${minutes}:${seconds}`;

                            segmentsHtml += `
                                    <li class="segment-item" data-start-time="${startTime}">
                                        <span class="segment-time">${time}</span>
                                        <p class="segment-desc">${segment.description || 'Brak opisu'}</p>
                                        <p class="segment-tags">${(segment.tags || []).join(', ')}</p>
                                    </li>
                                `;
                        });
                        segmentsHtml += '</ul>';
                    } else {
                        segmentsHtml += '<p>Brak segmentów dla tego filmu.</p>';
                    }
                    segmentsHtml += '</div>';

                    movieCard.innerHTML = movieHtml + segmentsHtml;
                    movieListContainer.appendChild(movieCard);
                });
            })
            .catch(error => {
                console.error('Błąd pobierania danych:', error);
                movieListContainer.innerHTML = `<p id="error" class="error">Nie udało się załadować filmów. Sprawdź, czy API działa i czy CORS jest włączony.</p>`;
            });
    }

    function playVideo(movieId, startTime) {
        const player = activePlayers[movieId];

        if (player) {
            player.seekTo(startTime, true);
            player.playVideo();
        } else {
            activePlayers[movieId] = new YT.Player(`player-${movieId}`, {
                height: '180',
                width: '100%',
                videoId: movieId,
                playerVars: {
                    'autoplay': 1,
                    'start': startTime,
                    'playsinline': 1
                }
            });
        }
    }

    movieListContainer.addEventListener('click', (event) => {
        const segmentElement = event.target.closest('.segment-item');
        if (!segmentElement) {
            return;
        }

        const cardElement = event.target.closest('.movie-card');
        const movieId = cardElement.dataset.movieId;
        const startTime = segmentElement.dataset.startTime;

        playVideo(movieId, startTime);
    });

</script>

</body>
</html>
