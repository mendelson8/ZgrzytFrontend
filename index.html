<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zgrzyt Wiki - Filmy</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0M91WW2KTX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-0M91WW2KTX');
    </script>

    <script async src="https://www.youtube.com/iframe_api"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 24px; background-color: #121212; color: #e0e0e0;
        }
        h1 { text-align: center; color: white; }

        #searchBar {
            display: block;
            width: 80%; max-width: 600px;
            margin: 20px auto 30px auto;
            padding: 12px 16px;
            font-size: 1.1em;
            color: #e0e0e0;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 25px;
        }

        #movieList {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; max-width: 1400px; margin: 20px auto;
        }

        .movie-card {
            background-color: #2a2a2a; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .video-placeholder { width: 100%; height: 180px; background-color: #000; }
        .video-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { padding: 16px; }
        .movie-info h3 { margin-top: 0; margin-bottom: 8px; font-size: 1.15em; color: white; }
        .movie-info p { font-size: 0.9em; color: #b0b0b0; margin: 4px 0; }
        .segments-container { padding: 0 16px 16px 16px; max-height: 200px; overflow-y: auto; border-top: 1px solid #444; }
        .segments-container ul { list-style: none; padding: 0; margin: 0; }
        .segment-item { border-bottom: 1px solid #3a3a3a; padding: 8px 4px; cursor: pointer; }
        .segment-item:hover { background-color: #3c3c3c; }
        .segment-time { font-weight: bold; color: #80cbc4; }
        .segment-desc { font-size: 0.9em; color: #ccc; }
        .segment-tags { font-size: 0.8em; color: #80cbc4; font-family: monospace; }
        html { scrollbar-width: thin; scrollbar-color: #555 #121212; }
        .segments-container { scrollbar-color: #555 #2a2a2a; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        html::-webkit-scrollbar-track, body::-webkit-scrollbar-track { background: #121212; }
        .segments-container::-webkit-scrollbar-track { background: #2a2a2a; }
        ::-webkit-scrollbar-thumb { background-color: #555; border-radius: 10px; }
        html::-webkit-scrollbar-thumb, body::-webkit-scrollbar-thumb { border: 2px solid #121212; }
        .segments-container::-webkit-scrollbar-thumb { border: 2px solid #2a2a2a; }
        ::-webkit-scrollbar-thumb:hover { background-color: #777; }
        ::-webkit-scrollbar-button, ::-webkit-scrollbar-button:start:decrement, ::-webkit-scrollbar-button:end:increment { display: none !important; width: 0 !important; height: 0 !important; }
        #noResults { text-align:center; font-size:1.2em; padding:20px; display:none; }
    </style>
</head>
<body>

<h1>🎞️ Filmy z Playlisty Zgrzytu</h1>
<input type="search" id="searchBar" placeholder="Filtruj po tagach, opisie, tytule...">
<p id="noResults">Brak wyników...</p>
<div id="movieList"></div>

<script>
    const apiUrl = 'https://zgrzyt-api-901505990545.europe-west4.run.app/api';
    const movieList = document.getElementById('movieList');
    let activePlayers = {};

    fetch(apiUrl)
        .then(res => res.json())
        .then(movies => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        const placeholder = entry.target;
                        const movie = JSON.parse(placeholder.dataset.movie);
                        renderMovieCard(placeholder, movie);
                        observer.unobserve(placeholder);
                    }
                });
            }, { rootMargin: "200px" });

            movies.forEach(movie => {
                const placeholder = document.createElement('div');
                placeholder.className = 'movie-card';
                placeholder.style.minHeight = '260px';
                placeholder.dataset.movie = JSON.stringify(movie);
                placeholder.innerHTML = `<div style='padding:20px;color:#777;'>Ładowanie...</div>`;
                movieList.appendChild(placeholder);
                observer.observe(placeholder);
            });
        });

    function renderMovieCard(card, movie){
        const date = movie.date ? new Date(movie.date).toLocaleDateString('pl-PL') : 'Brak daty';
        const thumb = movie.thumbnailUrl || 'https://via.placeholder.com/300x170?text=Brak+Miniaturki';

        card.innerHTML = `
        <div class="video-placeholder">
            <img src="${thumb}">
        </div>
        <div class="movie-info">
            <h3>${movie.title}</h3>
            <p><strong>Data:</strong> ${date}</p>
        </div>
        <div class="segments-container">
            <h4>Segmenty:</h4>
            <ul>
                ${movie.segments?.map(s => segmentHTML(s)).join('') || '<p>Brak segmentów</p>'}
            </ul>
        </div>`;

        card.querySelectorAll('.segment-item').forEach(seg => {
            seg.onclick = () => playVideo(movie.movieId, seg.dataset.start, card);
        });
    }

    function segmentHTML(segment){
        const t = segment.id.timestamp;
        const h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = (t%60).toString().padStart(2,'0');
        const time = h ? `${h}:${m.toString().padStart(2,'0')}:${s}` : `${m}:${s}`;
        return `<li class='segment-item' data-start='${t}'>
        <span class='segment-time'>${time}</span>
        <p class='segment-desc'>${segment.description||''}</p>
        <p class='segment-tags'>${(segment.tags||[]).join(', ')}</p>
    </li>`;
    }

    function playVideo(id, start, card){
        const box = card.querySelector('.video-placeholder');
        if(!activePlayers[id]){
            box.innerHTML = `<div id='player-${id}' style='width:100%;height:100%;'></div>`;
            activePlayers[id] = new YT.Player(`player-${id}`,{
                height:'180',width:'100%',videoId:id,
                playerVars:{autoplay:1,start:start,playsinline:1}
            });
        } else {
            activePlayers[id].seekTo(start); activePlayers[id].playVideo();
        }
    }

    let timer;
    document.getElementById('searchBar').addEventListener('input', e => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            const q = e.target.value.toLowerCase();
            const cards = [...movieList.children];
            let visible = 0;
            cards.forEach(c => {
                const movie = JSON.parse(c.dataset.movie||'{}');
                const text = (movie.title + (movie.segments||[]).map(s=>s.description).join(' ')).toLowerCase();
                const show = text.includes(q);
                c.style.display = show ? 'block' : 'none';
                if(show) visible++;
            });
            document.getElementById('noResults').style.display = visible? 'none':'block';
        },300);
    });
</script>
<script>
    let searchTimer;
    const searchInput = document.getElementById('searchBar');

    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            const terms = searchInput.value.toLowerCase().split(' ').filter(t => t);
            const cards = [...movieList.children];
            let anyVisible = false;

            cards.forEach(card => {
                const movie = JSON.parse(card.dataset.movie || '{}');
                const movieText = `${movie.title} ${(movie.segments||[]).map(s=>`${s.description} ${(s.tags||[]).join(' ')}`).join(' ')}`.toLowerCase();
                let movieVisible = terms.every(t => movieText.includes(t));

                const segments = card.querySelectorAll('.segment-item');
                let segmentMatches = false;

                segments.forEach(seg => {
                    const segText = `${seg.querySelector('.segment-time')?.textContent} ${seg.querySelector('.segment-desc')?.textContent} ${seg.querySelector('.segment-tags')?.textContent}`.toLowerCase();
                    const showSeg = terms.every(t => segText.includes(t));
                    seg.style.display = showSeg ? 'list-item' : 'none';
                    if (showSeg) segmentMatches = true;
                });

                const finalVisible = movieVisible || segmentMatches;
                card.style.display = finalVisible ? 'block' : 'none';
                if(finalVisible) anyVisible = true;
            });

            document.getElementById('noResults').style.display = anyVisible ? 'none' : 'block';

        }, 300);
    });
</script>
</body>
</html>
