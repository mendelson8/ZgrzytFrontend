<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zgrzyt Wiki - Filmy</title>

    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 24px; background-color: #121212; color: #e0e0e0;
        }
        h1 { text-align: center; color: white; }
        #movieList {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; max-width: 1400px; margin: 20px auto;
        }
        .movie-card {
            background-color: #2a2a2a; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        /* ZMIANA HTML: Kontener na wideo (miejsce na miniaturkę LUB odtwarzacz) */
        .video-placeholder {
            width: 100%;
            height: 180px;
            background-color: #000;
            border-bottom: 1px solid #444;
        }
        .video-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* iframe będzie miał 'width: 100%' i 'height: 180px' z JS */

        .movie-info { padding: 16px; }
        .movie-info h3 { margin-top: 0; margin-bottom: 8px; font-size: 1.15em; color: white; }
        .movie-info p { font-size: 0.9em; color: #b0b0b0; margin: 4px 0; }

        .segments-container {
            padding: 0 16px 16px 16px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #444;
        }
        .segments-container h4 { margin-bottom: 8px; color: #eee; }
        .segments-container ul { list-style: none; padding-left: 0; margin: 0; }

        /* ZMIANA HTML: Segmenty są teraz klikalne */
        .segment-item {
            border-bottom: 1px solid #3a3a3a; padding: 8px 4px;
            cursor: pointer; /* Wskazuje, że można kliknąć */
            transition: background-color 0.2s;
        }
        .segment-item:last-child { border-bottom: none; }
        .segment-item:hover { background-color: #3c3c3c; }

        .segment-time { font-weight: bold; color: #80cbc4; pointer-events: none; }
        .segment-desc { font-size: 0.9em; color: #ccc; pointer-events: none; }
        .segment-tags { font-size: 0.8em; color: #80cbc4; font-family: monospace; pointer-events: none; }

        #loading, #error { text-align: center; font-size: 1.2em; padding: 40px; }
        .error { color: #ff8a80; }
    </style>
</head>
<body>

<h1>🎞️ Filmy z Playlisty Zgrzytu</h1>
<div id="movieList">
    <p id="loading">Ładowanie filmów...</p>
</div>

<script>
    // KROK 2: Logika JavaScript

    const movieListContainer = document.getElementById('movieList');
    const loadingIndicator = document.getElementById('loading');
    const apiUrl = 'https://zgrzyt-api-xxxx-ew.a.run.app/api';

    // Obiekt do przechowywania wszystkich aktywnych odtwarzaczy
    // Kluczem będzie 'movieId', wartością będzie obiekt odtwarzacza YouTube
    let activePlayers = {};

    // 1. Ta funkcja jest automatycznie wywoływana przez API YouTube, gdy skrypt jest gotowy
    function onYouTubeIframeAPIReady() {
        fetchAndRenderMovies();
    }

    // 2. Funkcja pobierająca dane z Twojego API Spring Boot
    function fetchAndRenderMovies() {
        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error(`Błąd HTTP: ${response.status}`);
                return response.json();
            })
            .then(movies => {
                loadingIndicator.remove();
                if (movies.length === 0) {
                    movieListContainer.innerHTML = '<p>Brak filmów w bazie danych.</p>';
                    return;
                }

                movies.forEach(movie => {
                    const movieCard = document.createElement('div');
                    movieCard.className = 'movie-card';
                    // Przechowujemy ID filmu na karcie, aby łatwo je odczytać
                    movieCard.dataset.movieId = movie.movieId;

                    let formattedDate = 'Brak daty';
                    if (movie.publicationDate) {
                        formattedDate = new Date(movie.publicationDate).toLocaleDateString('pl-PL');
                    }
                    const thumbnailUrl = movie.thumbnailUrl || 'https://via.placeholder.com/300x170?text=Brak+Miniaturki';

                    // ZMIANA HTML: Tworzymy placeholder, który zostanie zastąpiony przez odtwarzacz
                    let movieHtml = `
                            <div class="video-placeholder">
                                <div id="player-${movie.movieId}">
                                    <img src="${thumbnailUrl}" alt="Miniaturka filmu" style="width:100%; height:100%; object-fit: cover;">
                                </div>
                            </div>
                            <div class="movie-info">
                                <h3>${movie.title}</h3>
                                <p><strong>Data:</strong> ${formattedDate}</p>
                            </div>
                        `;

                    // ZMIANA HTML: Tworzymy listę segmentów
                    let segmentsHtml = '<div class="segments-container"><h4>Segmenty:</h4>';
                    if (movie.segments && movie.segments.length > 0) {
                        segmentsHtml += '<ul>';
                        movie.segments.forEach(segment => {
                            const startTime = segment.id.timestamp;
                            const minutes = Math.floor(startTime / 60).toString().padStart(2, '0');
                            const seconds = (startTime % 60).toString().padStart(2, '0');
                            const time = `${minutes}:${seconds}`;

                            // Dodajemy klasę 'segment-item' i 'data-start-time' do <li>
                            segmentsHtml += `
                                    <li class="segment-item" data-start-time="${startTime}">
                                        <span class="segment-time">${time}</span>
                                        <p class="segment-desc">${segment.description || 'Brak descriptionu'}</p>
                                        <p class="segment-tags">${(segment.tagi || []).join(', ')}</p>
                                    </li>
                                `;
                        });
                        segmentsHtml += '</ul>';
                    } else {
                        segmentsHtml += '<p>Brak segmentów dla tego filmu.</p>';
                    }
                    segmentsHtml += '</div>';

                    movieCard.innerHTML = movieHtml + segmentsHtml;
                    movieListContainer.appendChild(movieCard);
                });
            })
            .catch(error => {
                console.error('Błąd pobierania danych:', error);
                movieListContainer.innerHTML = `<p id="error" class="error">Nie udało się załadować filmów.</p>`;
            });
    }

    // 3. Główna funkcja do odtwarzania wideo
    function playVideo(movieId, startTime) {
        const player = activePlayers[movieId];

        // Jeśli odtwarzacz dla tego filmu już istnieje:
        if (player) {
            player.seekTo(startTime, true); // Przewiń do czasu
            player.playVideo();             // Odtwórz
        }
        // Jeśli odtwarzacz nie istnieje (pierwsze kliknięcie):
        else {
            // Stwórz nowy odtwarzacz YouTube
            // Zastąpi on div o ID 'player-movieId' (w którym jest miniaturka)
            activePlayers[movieId] = new YT.Player(`player-${movieId}`, {
                height: '180',
                width: '100%',
                videoId: movieId,
                playerVars: {
                    'autoplay': 1,     // Odtwórz automatycznie
                    'start': startTime,  // Zacznij od podanego czasu
                    'playsinline': 1   // Ważne dla urządzeń mobilnych
                }
            });
        }
    }

    // 4. Globalny "słuchacz" kliknięć
    // Zamiast dodawać setki "słuchaczy", dodajemy jeden do rodzica
    movieListContainer.addEventListener('click', (event) => {
        // Znajdź kliknięty element <li> z klasą 'segment-item'
        const segmentElement = event.target.closest('.segment-item');

        // Jeśli kliknięto poza segmentem, nic nie rób
        if (!segmentElement) {
            return;
        }

        // Znajdź kartę rodzica, aby dostać ID filmu
        const cardElement = event.target.closest('.movie-card');

        const movieId = cardElement.dataset.movieId;
        const startTime = segmentElement.dataset.startTime;

        // Odtwórz wideo!
        playVideo(movieId, startTime);
    });

</script>

</body>
</html>
